# Local single-node Vespa engine. The application package (schema + rank
# profiles under ./vespa-engine/app) is deployed by the CLI, not by a compose sidecar:
#
#   sot up                       # start the engine, then deploy ./vespa-engine/app
#   docker compose up -d vespa   # just the engine (deploy separately)
#   sot deploy                   # (re)deploy after editing vespa-engine/app/schemas/doc.sd

services:
  vespa:
    image: vespaengine/vespa
    container_name: vespa
    hostname: vespa
    ports:
      - "8080:8080"     # query / document API
      - "19071:19071"   # config server
    volumes:
      - vespa_var:/opt/vespa/var
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:19071/state/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 60s
    restart: unless-stopped

volumes:
  vespa_var:

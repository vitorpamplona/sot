# Local single-node Vespa, mirroring the upstream brainstorm_one_click_deployment
# `vespa` + `vespa-deploy` services. This brings up the same Vespa engine and
# deploys the vendored ./vespa-app application package (schema + rank profiles),
# so the local index and ranking are identical to production.
#
#   docker compose up -d vespa            # start the engine
#   docker compose up vespa-deploy        # deploy/activate ./vespa-app
#
# Re-run `tools/deploy.sh` after editing vespa-app/schemas/doc.sd to push
# ranking-equation changes without recreating the container.

services:
  vespa:
    image: vespaengine/vespa
    container_name: vespa
    hostname: vespa
    ports:
      - "8080:8080"     # query / document API
      - "19071:19071"   # config server
    volumes:
      - vespa_var:/opt/vespa/var
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:19071/state/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 60s
    restart: unless-stopped

  vespa-deploy:
    image: vespaengine/vespa
    container_name: vespa-deploy
    depends_on:
      vespa:
        condition: service_healthy
    volumes:
      - ./vespa-app:/app:ro
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -euo pipefail
        echo "[vespa-deploy] packaging app..."
        tar -czf /tmp/app.tgz -C /app .
        echo "[vespa-deploy] prepareandactivate..."
        curl -fSs --data-binary @/tmp/app.tgz \
          -H 'Content-Type: application/x-gzip' \
          http://vespa:19071/application/v2/tenant/default/prepareandactivate
        echo "[vespa-deploy] waiting for container cluster to serve the app..."
        for i in $$(seq 1 120); do
          if curl -fSs -o /dev/null http://vespa:8080/ApplicationStatus; then
            echo "[vespa-deploy] vespa is serving — ready."
            exit 0
          fi
          sleep 2
        done
        echo "[vespa-deploy] timed out waiting for /ApplicationStatus" >&2
        exit 1
    restart: "no"

volumes:
  vespa_var:
